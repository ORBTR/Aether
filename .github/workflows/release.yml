# Aether — Wire Protocol Release
# Triggered on version tags (v*). Runs quality checks, builds WASM verification,
# and creates a GitHub Release with wasm_exec.js artifact.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.25.0'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -count=1 -timeout=5m ./...

      - name: Test coverage
        run: |
          go test -coverprofile=coverage.out -timeout=5m ./...
          go tool cover -func=coverage.out | tail -1

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  wasm-verify:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build (WASM)
        run: GOOS=js GOARCH=wasm go build ./...

  release:
    needs: [quality, wasm-verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Copy wasm_exec.js
        run: cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wasm_exec.js
